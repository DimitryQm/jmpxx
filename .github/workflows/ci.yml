# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: linux ${{ matrix.cxx }} c++${{ matrix.std }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        # g++-13 and clang-19 provide std::expected, so they exercise the expected
        # interop bridge; clang-18 against the system libstdc++ does not, so the
        # bridge absents itself there and the other bridges are exercised instead.
        cxx: [g++-13, clang++-18, clang++-19]
        std: ["20", "23"]
    steps:
      - uses: actions/checkout@v4
      - name: install ninja and only the compiler this cell uses
        # This step installed clang-18 and clang-19 for every cell, so the g++-13 cells
        # pulled two LLVM toolchains they never invoke (hundreds of megabytes). Each cell
        # now installs only its own compiler; g++-13 ships on the runner image.
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*
          sudo apt-get update
          case "${{ matrix.cxx }}" in
            g++-13)     COMPILER=g++-13 ;;
            clang++-18) COMPILER=clang-18 ;;
            clang++-19) COMPILER=clang-19 ;;
            *) echo "no package mapping for ${{ matrix.cxx }}"; exit 1 ;;
          esac
          sudo apt-get install -y ninja-build "$COMPILER"
      - name: configure
        # The benchmark and lint surfaces are exercised in the dedicated perf-and-lint job, which
        # provisions valgrind, Boost, and the LLVM development libraries; this matrix stays focused
        # on the library across compilers and standards. The size and compile-cost gates live in the
        # test tiers and run here regardless.
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} -DCMAKE_CXX_STANDARD=${{ matrix.std }} -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  cxx26-dialect:
    name: linux clang-19 c++26 dialect
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ninja-build clang-19
      - name: configure and build the core and interop under the C++26 dialect
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_CXX_STANDARD=26 -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: linux clang asan+ubsan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset asan-ubsan -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
      - run: cmake --build --preset asan-ubsan
      - run: ctest --preset asan-ubsan

  adversarial-hardening:
    name: adversarial hardening gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install adversarial verifier tools
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 clang-tools-18 llvm-18 afl++ git
      - name: cache MSan-instrumented libc++
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/jmpxx-msan-libcxx/install
            ${{ runner.temp }}/jmpxx-msan-libcxx/build
            ${{ runner.temp }}/jmpxx-msan-libcxx/llvm-project
          key: msan-libcxx-llvmorg-18.1.8-v1
      - name: provision MSan-instrumented libc++
        env:
          CC: clang-18
          CXX: clang++-18
        run: tests/scripts/provision_msan_libcxx.sh "$RUNNER_TEMP/jmpxx-msan-libcxx"
      - name: configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DJMPXX_BUILD_BENCHMARKS=OFF \
            -DJMPXX_BUILD_LINT=OFF \
            -DJMPXX_BUILD_REFERENCE_APP=OFF \
            -DJMPXX_MSAN_LIBCXX_ROOT="$RUNNER_TEMP/jmpxx-msan-libcxx/install"
      - name: build
        run: cmake --build build
      - name: run adversarial gates
        run: ctest --test-dir build --output-on-failure -R 'adversarial|hardening|config_matrix|msan|static_analysis|mutation|model'

  cross-arch:
    name: cross ${{ matrix.arch }} via qemu
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: aarch64, cxx: aarch64-linux-gnu-g++-13, qemu: qemu-aarch64-static, pkg: g++-13-aarch64-linux-gnu }
          - { arch: riscv64, cxx: riscv64-linux-gnu-g++-13, qemu: qemu-riscv64-static, pkg: g++-13-riscv64-linux-gnu }
          - { arch: armhf,   cxx: arm-linux-gnueabihf-g++-13, qemu: qemu-arm-static,   pkg: g++-13-arm-linux-gnueabihf }
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ${{ matrix.pkg }} qemu-user-static
      - name: cross build and run the portable core under emulation
        run: |
          ${{ matrix.cxx }} -std=c++20 -O2 -static -Iinclude tests/freestanding/fs_core.cpp -o fs_core
          ${{ matrix.qemu }} ./fs_core
      - name: cross build and run the interop bridges under emulation
        run: |
          ${{ matrix.cxx }} -std=c++23 -O2 -static -Iinclude tests/interop/roundtrip.cpp -o rt
          ${{ matrix.qemu }} ./rt
      - name: cross build and run the experimental unwind arm under emulation
        run: |
          ${{ matrix.cxx }} -std=c++20 -O2 -static -Iinclude tests/unwind/unwind_exec.cpp -o uexec
          ${{ matrix.qemu }} ./uexec

  wasm:
    name: wasm emscripten + node
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - name: build and run the portable core and interop on wasm
        run: |
          # node's global fetch rejects a file path, which the emscripten runtime
          # uses to load the .wasm; --no-experimental-fetch restores file reading.
          em++ -std=c++20 -O2 -sEXIT_RUNTIME=1 -Iinclude tests/freestanding/fs_core.cpp -o fs_core.js
          node --no-experimental-fetch fs_core.js
          em++ -std=c++20 -O2 -fno-exceptions -sEXIT_RUNTIME=1 -Iinclude tests/interop/no_exceptions_cell.cpp -o io.js
          node --no-experimental-fetch io.js
          # The unwind arm on WebAssembly: the virtual machine unwinds a typed escape,
          # so it is built with Wasm exception handling rather than -fno-exceptions.
          em++ -std=c++20 -O2 -fwasm-exceptions -sEXIT_RUNTIME=1 -Iinclude tests/unwind/unwind_exec.cpp -o uexec.js
          node --no-experimental-fetch uexec.js

  freebsd:
    name: freebsd vm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: build and run the portable and interop surface on a real FreeBSD VM
        uses: cross-platform-actions/action@v0.27.0
        with:
          operating_system: freebsd
          version: "14.2"
          run: |
            sudo pkg install -y cmake ninja
            cmake -S . -B build -G Ninja -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
            cmake --build build
            # The sanitizer and bash-scan tiers and the g++-13-pinned codegen and
            # freestanding tiers are covered on Linux; the BSD cell checks that the
            # portable and interop surface builds and runs natively on a real
            # FreeBSD system.
            ctest --test-dir build --output-on-failure -E 'sanitizer|fence|doc_claim|fuzz'

  macos:
    name: macos apple-clang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja
      - run: cmake -S . -B build -G Ninja -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
      - run: cmake --build build
      - run: ctest --test-dir build --output-on-failure

  windows:
    name: windows msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - run: cmake -S . -B build -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
      - run: cmake --build build --config Release
      - run: ctest --test-dir build --output-on-failure -C Release
      - name: build and run the experimental unwind arm on MSVC
        shell: cmd
        run: cl /std:c++latest /EHsc /O2 /nologo /I include tests\unwind\unwind_exec.cpp /Fe:uexec.exe && uexec.exe

  packaging:
    name: packaging channel and reference application
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ninja-build
      - name: install jmpxx
        run: |
          cmake -S . -B build -G Ninja -DJMPXX_BUILD_TESTS=OFF -DJMPXX_BUILD_VERIFY=OFF -DJMPXX_BUILD_BENCHMARKS=OFF -DJMPXX_BUILD_LINT=OFF
          cmake --install build --prefix "$HOME/jmpxx-prefix"
      - name: build and test the reference application against the installed package
        run: |
          cmake -S reference_app -B refbuild -G Ninja -DCMAKE_PREFIX_PATH="$HOME/jmpxx-prefix"
          cmake --build refbuild
          ctest --test-dir refbuild --output-on-failure

  perf-and-lint:
    name: perf gates and lint companion
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # valgrind drives the deterministic instruction-count gate, Boost provides the Outcome and
      # LEAF incumbents, and the LLVM development packages build the companion check set. None is a
      # runtime dependency of the library; all are dev-only, used by this verification job.
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ninja-build valgrind libboost-dev llvm-18-dev libclang-18-dev clang-tools-18
      - name: build the benchmark and lint surfaces
        run: |
          cmake -S . -B build -G Ninja \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm -DClang_DIR=/usr/lib/llvm-18/lib/cmake/clang
          cmake --build build
      - name: run the size, compile-cost, perf, and lint gates
        run: ctest --test-dir build --output-on-failure -R 'size_delta|compile_cost|bench|lint'

  reflection:
    name: c++26 reflection cell
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # The reflection-capable toolchain is a fetched container, the Bloomberg
      # clang-p2996 fork, pinned by digest. It builds the reflection layer on the
      # reflection path; the same fixture builds on the C++20 cell through the
      # hand-written fallback, and both must produce the same results.
      - name: build and run the reflection layer on the reflection path
        run: |
          IMG=vsavkov/clang-p2996@sha256:6672c4227b09efc7318695c17e8a8f696e193f451b52d885d220f593593dc1c8
          docker run --rm -v "$PWD":/src -w /src "$IMG" bash -lc '
            FLAGS="-std=c++26 -freflection -fexpansion-statements -stdlib=libc++ -DJMPXX_REFLECTION=1 -Wl,-rpath,/opt/p2996/clang/lib/x86_64-unknown-linux-gnu -Iinclude"
            clang++ $FLAGS tests/reflect/reflect_behavior.cpp -o /tmp/rb && /tmp/rb
            clang++ $FLAGS examples/reflection.cpp -o /tmp/rx && /tmp/rx'
      - name: confirm the C++20 cell builds the full core with the reflection layer absent
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y g++-13
          g++-13 -std=c++20 -fno-exceptions -fno-rtti -Iinclude -fsyntax-only examples/reflection.cpp
          g++-13 -std=c++20 -fno-exceptions -fno-rtti -Iinclude -fsyntax-only -c tests/freestanding/fs_core.cpp -o /dev/null

  packaging-consumers:
    name: packaging consumers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -f /etc/apt/sources.list.d/microsoft* /etc/apt/sources.list.d/azure*; sudo apt-get update && sudo apt-get install -y ninja-build pipx
      - name: add_subdirectory and FetchContent channel
        run: |
          cmake -S packaging/consumers/subdir -B b_subdir -G Ninja -DJMPXX_ROOT="$PWD"
          cmake --build b_subdir
          ctest --test-dir b_subdir --output-on-failure
      - name: single-header amalgamation channel
        run: |
          cmake -S packaging/consumers/amalgamation -B b_amalg -G Ninja -DJMPXX_ROOT="$PWD"
          cmake --build b_amalg
          ctest --test-dir b_amalg --output-on-failure
      - name: conan channel (create plus test_package round-trip)
        run: |
          pipx install conan
          conan profile detect --force
          conan create . -s compiler.cppstd=20
